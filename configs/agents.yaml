# 本地 Agent 配置文件
# Agent 从配置中加载，不再支持远程创建
# Worker 启动时根据此配置初始化 Eino 适配器

agents:
  # ReAct Agent - 基础的思考-行动-观察循环
  react:
    type: "react"
    description: "ReAct (Reasoning + Acting) 智能体"
    llm: "default"
    max_iterations: 10
    tools:                        # 可选：限制工具子集；空或省略 = 全部工具
      - "web_search"
      - "calculator"
    system_prompt: |
      You are a helpful AI assistant.
      Think step by step to solve problems.
      Use tools when needed to gather information.

  # DEER Agent - 增强的推理和执行
  deer:
    type: "deer"
    description: "DEER-Go 增强推理智能体"
    llm: "default"
    max_iterations: 15
    tools: []                     # 空列表 = 使用全部可用工具
    system_prompt: |
      You are an advanced reasoning agent.
      Decompose complex problems into smaller steps.
      Use tools efficiently to gather information.

  # Manus Agent - 自主执行智能体
  manus:
    type: "manus"
    description: "Manus 自主执行智能体"
    llm: "default"
    max_iterations: 20
    tools:                        # 指定工具子集
      - "web_search"
      - "calculator"
      - "file_reader"
      - "http_request"
    system_prompt: |
      You are an autonomous agent capable of completing complex tasks.
      Plan your approach and execute step by step.
      Always verify your results.

  # External HTTP Agent - 黑盒接入已有 Python/JS/Go Agent
  # customer_support_bot:
  #   type: "external_http"
  #   description: "Existing customer support agent"
  #   external:
  #     url: "http://customer-bot:9000/invoke"
  #     timeout: "120s"
  #     token_env: "CUSTOMER_BOT_TOKEN"

  # Python framework agents - LangChain/LangGraph 等框架生成的 agent
  # 可直接用框架类型别名注册；运行时会生成 external_agent_call 节点接入 AgentRuntime。
  # langchain_research_agent:
  #   type: "langchain"
  #   description: "Existing LangChain ReAct agent"
  #   external:
  #     url: "http://localhost:9000/invoke"
  #     timeout: "120s"
  #
  # langgraph_research_agent:
  #   type: "langgraph"
  #   description: "Existing LangGraph compiled graph"
  #   external:
  #     url: "http://localhost:9001/invoke"
  #     timeout: "120s"
  #
  # Embedded framework agent - 显式 manifest 声明内部节点，由 Aetheris TaskGraph 执行
  # embedded_langchain_research_agent:
  #   type: "langchain"
  #   description: "Embedded LangChain agent with Runtime-owned internal steps"
  #   external:
  #     mode: "embedded"
  #     url: "http://localhost:9000"
  #     timeout: "120s"
  #     manifest_path: "./configs/framework-agents/research_agent.manifest.json"

  # superagent-base 集成 —— 开源 AI Agent 平台（SSE 流式协议）
  # 项目地址：https://github.com/Colin4k1024/superagent-base
  # 启动 superagent-base 服务后取消注释即可接入。
  # 环境变量 SUPERAGENT_BASE_API_KEY 设置为 superagent-base 的 api_key。
  # agent_id 可指定要调用的具体 Agent（留空则使用远端默认值 "research-agent"）。
  # superagent_base:
  #   type: "external_http"
  #   description: "superagent-base 开源 AI Agent 平台（SSE 流式接入）"
  #   external:
  #     url: "http://localhost:8888/api/v1/chat/stream"
  #     timeout: "120s"
  #     token_env: "SUPERAGENT_BASE_API_KEY"
  #     protocol: "sse_legacy"
  #     agent_id: "research-agent"    # 可选，指定远端 Agent ID

  # Chain - 简单链式调用
  conversation:
    type: "chain"
    chain_type: "conversation"
    description: "简单对话链"
    llm: "default"

  # Graph - 有向无环图
  chat_graph:
    type: "graph"
    graph_type: "directed"
    description: "对话图"
    llm: "default"

  # Workflow - 线性工作流
  linear_workflow:
    type: "workflow"
    workflow_type: "linear"
    description: "线性工作流"
    llm: "default"

# 默认 LLM 配置
llm:
  provider: "openai"
  model: "gpt-4o-mini"
  api_key: "${OPENAI_API_KEY}"

# 工具配置
tools:
  enabled:
    - "web_search"
    - "calculator"
    - "file_reader"
    - "http_request"

  web_search:
    api_key: "${SEARCH_API_KEY}"
    engine: "duckduckgo"

  calculator:
    precision: 10

  file_reader:
    allowed_paths:
      - "./data"
      - "/tmp"

  http_request:
    timeout: 30
    max_retries: 3
