# Worker 服务配置
worker:
  concurrency: 4
  queue_size: 1000
  retry_count: 3
  retry_delay: 1s
  timeout: 5m
  # Agent Job 拉取间隔（从事件存储 Claim）
  poll_interval: "2s"
  # Worker 能力列表；仅认领 Job.required_capabilities 被满足的 Job；空表示接受任意 Job（如 llm, tool, rag）
  # capabilities: ["llm", "tool"]
  
  # 队列公平性策略（2.0 starvation prevention）
  fairness_policy:
    realtime_weight: 70    # 实时队列权重 70%
    default_weight: 20     # 默认队列权重 20%
    background_weight: 8   # 后台队列权重 8%
    heavy_weight: 2        # 重任务队列权重 2%
    starvation_threshold: "5m"  # 低优先级任务等待超过 5 分钟，临时提升优先级

# 任务事件与元数据存储（与 API 共用 DSN 时，Worker Claim 执行 Job）
jobstore:
  type: "postgres"
  dsn: "postgres://aetheris:aetheris@localhost:5432/aetheris?sslmode=disable"
  lease_duration: "30s"

# Runtime profile（prod 严格模式下强制要求 postgres 持久化依赖）
runtime:
  profile: "dev"   # dev | prod
  strict: false
  # Operational Runtime：快照减少长事件流 replay 成本，GC 清理过期 tool invocation/checkpoint 数据。
  snapshot:
    enabled: true
    interval: "1h"
    event_threshold: 1000
    batch_limit: 50
    keep_latest: 1
  gc:
    enabled: true
    interval: "24h"
    ttl_days: 90
    batch_size: 1000

# Effect Store（两步提交第一阶段：先写 effect，再写 command_committed）
effect_store:
  type: "postgres"   # memory | postgres
  dsn: "postgres://corag:corag@postgres:5432/corag?sslmode=disable"

# Checkpoint Store（恢复点存储）
checkpoint_store:
  type: "postgres"   # memory | postgres
  dsn: "postgres://corag:corag@postgres:5432/corag?sslmode=disable"

# 存储配置（当前元数据仅支持 memory；mysql 等需后续实现）
storage:
  metadata:
    type: "memory"
    dsn: ""
    pool_size: 0
  # 向量库：type=memory 为内存；collection 为默认索引/集合名（ingest 写入与 query 检索共用）
  # 其他 type（如 pgvector/milvus）需实现对应 Store 后在 store.go 中扩展
  vector:
    type: "memory"
    addr: ""
    db: ""
    collection: "default"
  object:
    type: "memory"
  cache:
    type: "memory"
  # 入库管线：batch_size（每批写入向量数）、concurrency（embedding/索引并发）
  ingest:
    batch_size: 100
    concurrency: 4

# 模型配置（LLM/Embedding/Vision）由 configs/model.yaml 合并提供，Worker 使用 LoadWorkerConfigWithModel 加载

# 切片配置
splitter:
  chunk_size: 1000
  chunk_overlap: 100
  max_chunks: 1000

# 日志配置
log:
  level: "info"
  format: "json"
  file: "worker.log"

# 监控配置（多 Worker 时可用环境变量 AETHERIS_WORKER_METRICS_PORT 指定不同端口，如 9094）
monitoring:
  prometheus:
    enable: true
    port: 9093

# MCP (Model Context Protocol) 服务器配置
# Worker 在启动时自动连接配置的 MCP 服务器，动态发现并注册工具
mcp:
  init_timeout: "30s"
  servers: {}
  # 示例：
  # filesystem:
  #   type: stdio
  #   command: npx
  #   args: ["-y", "@modelcontextprotocol/server-filesystem", "/tmp"]

# Hermes-Agent 集成配置 (Phase 1: MCP Bridge + Phase 2: ACP Dispatch)
# 参考: https://github.com/NousResearch/hermes-agent
#
# Phase 1 (MCP Bridge): 将 Hermes 暴露的 MCP 工具（terminal, file, search_files 等）
#   直接注册为 Aetheris 工具，Eino 工作流和 Agent 可直接调用。
#
# Phase 2 (ACP Dispatch): 注册 hermes_dispatch 工具，工作流可将编码/终端/消息任务
#   委托给 Hermes 执行，每次派发携带 job_id 用于 Event Store 关联与审计。
#
# 启动 Hermes MCP Server: hermes mcp serve --port 8765
hermes:
  enabled: false

  # --- Phase 1: MCP Bridge ---
  # Option A: SSE 传输（Hermes 作为独立服务运行）
  # mcp_endpoint: "http://localhost:8765/sse"
  # mcp_timeout: "60s"
  # mcp_headers:
  #   Authorization: "Bearer ${HERMES_API_KEY}"  # NOTE: ${...} env-substitution is NOT supported in header values; set the env var and reference it via a custom config loader if needed.

  # Option B: stdio 传输（Hermes 作为子进程启动）
  # mcp_command: "hermes"
  # mcp_args: ["mcp", "serve"]

  # MCP 服务器在工具注册表中的名称（默认: hermes）
  # server_name: "hermes"

  # --- Phase 2: ACP Dispatch ---
  # Hermes ACP HTTP 端点（设置后自动注册 hermes_dispatch 工具）
  # acp_endpoint: "http://localhost:8765"
  # acp_timeout: "120s"
