# API embedded local-first config
api:
  port: 8080
  host: "0.0.0.0"
  timeout: 30s
  cors:
    enable: true
    allow_origins: ["*"]
  middleware:
    auth: false
    rate_limit: true
    rate_limit_rps: 100
    jwt_key: ""
    jwt_timeout: "1h"
    jwt_max_refresh: "1h"
  forensics:
    experimental: false
  grpc:
    enable: false
    port: 9090

runtime:
  profile: "dev"
  strict: false

jobstore:
  type: "embedded"
  dsn: "./data/embedded"
  lease_duration: "30s"

effect_store:
  type: "embedded"
  dsn: "./data/embedded"

checkpoint_store:
  type: "embedded"
  dsn: "./data/embedded"

agent:
  job_scheduler:
    enabled: true
    max_concurrency: 2
    retry_max: 2
    backoff: "1s"
  adk:
    enabled: true
    checkpoint_store: "memory"

storage:
  metadata:
    type: "memory"
    dsn: ""
    pool_size: 0
  vector:
    type: "memory"
    addr: ""
    db: ""
    collection: "default"
    password: ""
  object:
    type: "memory"
  cache:
    type: "memory"
  ingest:
    batch_size: 100
    concurrency: 4

log:
  level: "info"
  format: "json"
  file: ""

monitoring:
  prometheus:
    enable: true
    port: 9092
  tracing:
    enable: false
