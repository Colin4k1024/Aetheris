# Worker embedded local-first config
worker:
  concurrency: 1
  queue_size: 1000
  retry_count: 3
  retry_delay: 1s
  timeout: 5m
  poll_interval: "2s"
  max_attempts: 3

runtime:
  profile: "dev"
  strict: false

jobstore:
  type: "embedded"
  dsn: "./artifacts/readme-scenario-proof/data/embedded"
  lease_duration: "30s"

effect_store:
  type: "embedded"
  dsn: "./artifacts/readme-scenario-proof/data/embedded"

checkpoint_store:
  type: "embedded"
  dsn: "./artifacts/readme-scenario-proof/data/embedded"

# In split API/Worker mode, keep the same external_http agent definitions
# available to both API and Worker processes: the API needs them to accept
# /api/agents/:id/message and the Worker needs them to execute jobs. For
# API-only embedded quickstarts, putting the block in api.embedded.yaml is
# enough because the API runs the local scheduler.

storage:
  metadata:
    type: "memory"
    dsn: ""
    pool_size: 0
  vector:
    type: "memory"
    addr: ""
    db: ""
    collection: "default"
  object:
    type: "memory"
  cache:
    type: "memory"
  ingest:
    batch_size: 100
    concurrency: 4

log:
  level: "info"
  format: "json"
  file: "worker.log"

monitoring:
  prometheus:
    enable: true
    port: 9093

agents:
  agents:
    crash_demo_batch_processor:
      type: "external_http"
      description: "Batch processor agent for external_http boundary demo"
      external:
        url: "http://127.0.0.1:19001/invoke"
        timeout: "60s"
