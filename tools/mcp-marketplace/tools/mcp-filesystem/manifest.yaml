name: mcp-filesystem
version: 1.0.0
description: Filesystem operations tool for reading, writing, and searching files
author: Aetheris Team
category: storage

tools:
  - name: mcp-filesystem
    description: Filesystem operations tool with path security validation
    parameters:
      - name: action
        type: string
        required: true
        description: Action to perform
        enum:
          - read_file
          - write_file
          - list_dir
          - search_files
          - delete_file
          - make_dir
          - exists
      - name: path
        type: string
        required: true
        description: File or directory path
      - name: content
        type: string
        required: false
        description: File content for write_file action
      - name: pattern
        type: string
        required: false
        description: Glob pattern for search_files action
      - name: recursive
        type: boolean
        required: false
        description: Search recursively
      - name: limit
        type: integer
        required: false
        description: Maximum number of results
      - name: encoding
        type: string
        required: false
        default: utf-8
        description: File encoding

configuration:
  - name: FS_ROOT_DIR
    type: string
    required: true
    default: /data
    description: Root directory for file operations
  - name: FS_ALLOWED_PATHS
    type: array
    required: false
    description: List of allowed paths
  - name: FS_MAX_FILE_SIZE
    type: integer
    required: false
    default: 10485760
    description: Maximum file size in bytes
