# Aetheris CI: build, vet, test, lint, and coverage on push and pull_request.
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.1"
          cache-dependency-path: go.sum

      - name: Build
        run: go build -v ./...

      - name: Vet
        run: go vet ./...

      - name: Check gofmt
        run: |
          if [ -n "$(gofmt -l .)" ]; then
            echo "The following files are not formatted with gofmt:"
            gofmt -l .
            exit 1
          fi

      - name: Run unit tests
        run: go test -v -race -count=1 -short ./...

      - name: Test coverage (atomic mode)
        run: go test -coverprofile=coverage.out -covermode=atomic ./...

      - name: Check coverage threshold (core modules >= 60%)
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | grep total: | awk '{print $3}' | sed 's/%//')
          echo "Overall Coverage: $COVERAGE%"
          
          # Check core module coverage (internal/runtime, internal/agent, internal/pipeline)
          echo ""
          echo "=== Core Module Coverage ==="
          go tool cover -func=coverage.out | grep -E "(internal/runtime|internal/agent|internal/pipeline)" | head -20
          
          # Overall threshold: 50% (raised from 30%)
          if [ "$(echo "$COVERAGE < 50" | awk -F'.' '{print ($1*100+$2)<5000}')" = "1" ]; then
            echo "ERROR: Overall code coverage is below 50%"
            exit 1
          fi
          echo ""
          echo "✓ Coverage check passed (>= 50%)"

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.out
          flags: unittests

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.1"
          cache-dependency-path: go.sum

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --timeout=5m

  postgres-integration:
    name: Postgres Integration
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: aetheris
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d aetheris"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      TEST_JOBSTORE_DSN: postgres://postgres:postgres@localhost:5432/aetheris?sslmode=disable
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.1"
          cache-dependency-path: go.sum

      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Apply schema
        run: psql "$TEST_JOBSTORE_DSN" -f internal/runtime/jobstore/schema.sql

      - name: Run Postgres-backed tests
        run: go test -v ./internal/runtime/jobstore ./internal/agent/job

  coverage-report:
    name: Coverage Report
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.1"
          cache-dependency-path: go.sum

      - name: Generate coverage report
        run: |
          go test -coverprofile=coverage.out -covermode=atomic ./...
          
      - name: Display coverage summary
        run: |
          echo "=== Coverage Summary by Package ==="
          go tool cover -func=coverage.out | grep total:
          
          echo ""
          echo "=== Packages with lowest coverage (top 10) ==="
          go tool cover -func=coverage.out | grep -v total: | sort -t$'\t' -k3 -n | head -10

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.out
          retention-days: 30
