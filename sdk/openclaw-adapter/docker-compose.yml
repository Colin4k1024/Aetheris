version: "3.9"

# Local development stack:
#   openclaw-adapter  — listens on :3100  (this package)
#   aetheris-api      — Aetheris HTTP API on :8080
#   aetheris-worker   — Aetheris background worker
#   postgres          — durable job store on :5432
#
# Usage:
#   docker compose up
#   curl -X POST http://localhost:3100/webhook/message \
#     -H 'Content-Type: application/json' \
#     -d '{"platform":"telegram","chatId":"1","text":"hello"}'

services:
  # ── Aetheris API ────────────────────────────────────────────────────────────
  aetheris-api:
    image: aetheris/api:latest          # or build: ../..
    ports:
      - "8080:8080"
    environment:
      CONFIG_PATH: /configs/api.yaml
      DB_DSN: postgres://aetheris:aetheris@postgres:5432/aetheris?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # ── Aetheris Worker ─────────────────────────────────────────────────────────
  aetheris-worker:
    image: aetheris/worker:latest       # or build: ../..
    environment:
      CONFIG_PATH: /configs/worker.yaml
      DB_DSN: postgres://aetheris:aetheris@postgres:5432/aetheris?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # ── OpenClaw Adapter (this package) ─────────────────────────────────────────
  openclaw-adapter:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3100:3100"
    environment:
      AETHERIS_BASE_URL: http://aetheris-api:8080
      AETHERIS_TOKEN: ${AETHERIS_TOKEN}
      AETHERIS_AGENT_ID: ${AETHERIS_AGENT_ID:-react}
      PORT: "3100"
      JOB_TIMEOUT_MS: ${JOB_TIMEOUT_MS:-120000}
      POLL_INTERVAL_MS: ${POLL_INTERVAL_MS:-1500}
    depends_on:
      - aetheris-api
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3100/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: aetheris
      POSTGRES_PASSWORD: aetheris
      POSTGRES_DB: aetheris
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aetheris"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres-data:
