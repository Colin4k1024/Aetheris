# CoRag + Ollama + Eino Examples 完整测试环境
# 运行: docker compose -f deployments/compose/docker-compose.v2.yml up -d

services:
  # PostgreSQL 数据库
  postgres:
    image: registry.openanolis.cn/openanolis/postgres:10.21-8.6
    environment:
      POSTGRES_USER: corag
      POSTGRES_PASSWORD: corag
      POSTGRES_DB: corag
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../../internal/runtime/jobstore/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U corag -d corag"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Ollama LLM 服务
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0:11434
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 10s
      timeout: 5s
      retries: 3

  # CoRag API 服务
  api:
    build:
      context: ../..
      dockerfile: deployments/compose/Dockerfile
    command: ["/usr/local/bin/api"]
    working_dir: /app
    volumes:
      - ../../configs:/app/configs:ro
    environment:
      JOBSTORE_TYPE: postgres
      JOBSTORE_DSN: "postgres://corag:corag@postgres:5432/corag?sslmode=disable"
      JOBSTORE_LEASE_DURATION: "180s"
      PLANNER_TYPE: "${PLANNER_TYPE:-rule}"
      API_MIDDLEWARE_AUTH: "true"
      API_MIDDLEWARE_JWT_KEY: "local-dev-jwt-key"
      MODEL_DEFAULTS_LLM: "openai.gpt_35_turbo"
      # Ollama OpenAI 兼容 API
      MODEL_LLM_PROVIDERS_OPENAI_BASE_URL: "http://ollama:11434/v1"
      MODEL_LLM_PROVIDERS_OPENAI_API_KEY: "ollama"
      MODEL_LLM_PROVIDERS_OPENAI_MODELS_GPT_35_TURBO_NAME: "${OLLAMA_MODEL:-llama3}"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_healthy

  # CoRag Worker 1
  worker1:
    build:
      context: ../..
      dockerfile: deployments/compose/Dockerfile
    command: ["/usr/local/bin/worker"]
    working_dir: /app
    environment:
      WORKER_ID: worker-1
      JOBSTORE_TYPE: postgres
      JOBSTORE_DSN: "postgres://corag:corag@postgres:5432/corag?sslmode=disable"
      JOBSTORE_LEASE_DURATION: "180s"
      PLANNER_TYPE: "${PLANNER_TYPE:-rule}"
      STORAGE_METADATA_TYPE: memory
      STORAGE_VECTOR_TYPE: memory
      MODEL_DEFAULTS_LLM: "openai.gpt_35_turbo"
      MODEL_LLM_PROVIDERS_OPENAI_BASE_URL: "http://ollama:11434/v1"
      MODEL_LLM_PROVIDERS_OPENAI_API_KEY: "ollama"
      MODEL_LLM_PROVIDERS_OPENAI_MODELS_GPT_35_TURBO_NAME: "${OLLAMA_MODEL:-llama3}"
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_healthy

  # CoRag Worker 2
  worker2:
    build:
      context: ../..
      dockerfile: deployments/compose/Dockerfile
    command: ["/usr/local/bin/worker"]
    working_dir: /app
    environment:
      WORKER_ID: worker-2
      JOBSTORE_TYPE: postgres
      JOBSTORE_DSN: "postgres://corag:corag@postgres:5432/corag?sslmode=disable"
      JOBSTORE_LEASE_DURATION: "180s"
      PLANNER_TYPE: "${PLANNER_TYPE:-rule}"
      STORAGE_METADATA_TYPE: memory
      STORAGE_VECTOR_TYPE: memory
      MODEL_DEFAULTS_LLM: "openai.gpt_35_turbo"
      MODEL_LLM_PROVIDERS_OPENAI_BASE_URL: "http://ollama:11434/v1"
      MODEL_LLM_PROVIDERS_OPENAI_API_KEY: "ollama"
      MODEL_LLM_PROVIDERS_OPENAI_MODELS_GPT_35_TURBO_NAME: "${OLLAMA_MODEL:-llama3}"
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_healthy

  # Eino Examples 测试服务
  eino-tester:
    build:
      context: ../..
      dockerfile: deployments/compose/Dockerfile
    command: ["tail", "-f", "/dev/null"]
    working_dir: /app
    environment:
      OLLAMA_BASE_URL: "http://ollama:11434"
      OLLAMA_MODEL: "${OLLAMA_MODEL:-llama3}"
    volumes:
      - ../../examples:/app/examples:ro
      - ../../internal/agent/runtime/executor/eino_examples:/app/eino_examples:ro
    depends_on:
      ollama:
        condition: service_healthy
    profiles:
      - test

  # Prometheus 监控
  prometheus:
    image: ${PROMETHEUS_IMAGE:-prom/prometheus:v2.47.0}
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    ports:
      - "9090:9090"
    depends_on:
      - api

  # Jaeger 链路追踪
  jaeger:
    image: jaegertracing/all-in-one:1.52
    ports:
      - "16686:16686"        # Jaeger UI
      - "4317:4317"         # OTLP HTTP receiver
      - "4318:4318"         # OTLP gRPC receiver
      - "14268:14268"       # Jaeger HTTP collector
    environment:
      - COLLECTOR_OTLP_ENABLED=true
      - SPAN_STORAGE_TYPE=badger
    volumes:
      - jaeger_data:/badger

volumes:
  postgres_data: {}
  ollama_data: {}
  jaeger_data: {}
