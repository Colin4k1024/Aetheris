# CoRag + 本地 Ollama + Eino Examples 完整测试环境
# 运行: docker compose -f deployments/compose/docker-compose.v2.yml up -d
#
# 注意: 需要先在宿主机启动 Ollama:
#   ollama serve
#   ollama pull llama3

services:
  # PostgreSQL 数据库
  postgres:
    image: registry.openanolis.cn/openanolis/postgres:10.21-8.6
    environment:
      POSTGRES_USER: corag
      POSTGRES_PASSWORD: corag
      POSTGRES_DB: corag
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../../internal/runtime/jobstore/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U corag -d corag"]
      interval: 5s
      timeout: 3s
      retries: 5

  # CoRag API 服务
  api:
    build:
      context: ../..
      dockerfile: deployments/compose/Dockerfile
    command: ["/usr/local/bin/api"]
    working_dir: /app
    volumes:
      - ../../configs:/app/configs:ro
    environment:
      JOBSTORE_TYPE: postgres
      JOBSTORE_DSN: "postgres://corag:corag@postgres:5432/corag?sslmode=disable"
      JOBSTORE_LEASE_DURATION: "180s"
      PLANNER_TYPE: "rule"
      API_MIDDLEWARE_AUTH: "true"
      API_MIDDLEWARE_JWT_KEY: ${API_MIDDLEWARE_JWT_KEY}
      MODEL_DEFAULTS_LLM: "openai.gpt_35_turbo"
      # 连接宿主机本地 Ollama
      MODEL_LLM_PROVIDERS_OPENAI_BASE_URL: "http://host.docker.internal:11434/v1"
      MODEL_LLM_PROVIDERS_OPENAI_API_KEY: "ollama"
      MODEL_LLM_PROVIDERS_OPENAI_MODELS_GPT_35_TURBO_NAME: "${OLLAMA_MODEL:-llama3}"
    ports:
      - "8080:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy

  # CoRag Worker 1
  worker1:
    build:
      context: ../..
      dockerfile: deployments/compose/Dockerfile
    command: ["/usr/local/bin/worker"]
    working_dir: /app
    environment:
      WORKER_ID: worker-1
      JOBSTORE_TYPE: postgres
      JOBSTORE_DSN: "postgres://corag:corag@postgres:5432/corag?sslmode=disable"
      JOBSTORE_LEASE_DURATION: "180s"
      PLANNER_TYPE: "rule"
      STORAGE_METADATA_TYPE: memory
      STORAGE_VECTOR_TYPE: memory
      MODEL_DEFAULTS_LLM: "openai.gpt_35_turbo"
      MODEL_LLM_PROVIDERS_OPENAI_BASE_URL: "http://host.docker.internal:11434/v1"
      MODEL_LLM_PROVIDERS_OPENAI_API_KEY: "ollama"
      MODEL_LLM_PROVIDERS_OPENAI_MODELS_GPT_35_TURBO_NAME: "${OLLAMA_MODEL:-llama3}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy

  # CoRag Worker 2
  worker2:
    build:
      context: ../..
      dockerfile: deployments/compose/Dockerfile
    command: ["/usr/local/bin/worker"]
    working_dir: /app
    environment:
      WORKER_ID: worker-2
      JOBSTORE_TYPE: postgres
      JOBSTORE_DSN: "postgres://corag:corag@postgres:5432/corag?sslmode=disable"
      JOBSTORE_LEASE_DURATION: "180s"
      PLANNER_TYPE: "rule"
      STORAGE_METADATA_TYPE: memory
      STORAGE_VECTOR_TYPE: memory
      MODEL_DEFAULTS_LLM: "openai.gpt_35_turbo"
      MODEL_LLM_PROVIDERS_OPENAI_BASE_URL: "http://host.docker.internal:11434/v1"
      MODEL_LLM_PROVIDERS_OPENAI_API_KEY: "ollama"
      MODEL_LLM_PROVIDERS_OPENAI_MODELS_GPT_35_TURBO_NAME: "${OLLAMA_MODEL:-llama3}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy

  # Prometheus 监控
  prometheus:
    image: ${PROMETHEUS_IMAGE:-prom/prometheus:v2.47.0}
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    ports:
      - "9090:9090"
    depends_on:
      - api

  # Grafana 可视化看板
  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

  # Jaeger 链路追踪
  jaeger:
    image: jaegertracing/all-in-one:1.52
    ports:
      - "16686:16686"        # Jaeger UI
      - "4317:4317"         # OTLP HTTP receiver
      - "4318:4318"         # OTLP gRPC receiver
      - "14268:14268"       # Jaeger HTTP collector
    environment:
      - COLLECTOR_OTLP_ENABLED=true
      - SPAN_STORAGE_TYPE=badger
    volumes:
      - jaeger_data:/badger

volumes:
  postgres_data: {}
  jaeger_data: {}
  grafana_data: {}
